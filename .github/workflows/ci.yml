name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-flight run when a newer commit arrives on the same ref —
# saves minutes on rapid fixup pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: cargo test (engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine/**/Cargo.lock', 'engine/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test (engine workspace)
        working-directory: engine
        run: cargo test --workspace --all-targets

  node-tests:
    name: vitest (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [mobile, overlay, fps]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: npm ci
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: vitest
        working-directory: ${{ matrix.app }}
        run: npm test

  e2e:
    name: playwright e2e (${{ matrix.app }})
    runs-on: ubuntu-latest
    # Need engine binary + chromium + app build chained — give it room.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        app: [mobile, fps, overlay]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('engine/**/Cargo.lock', 'engine/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build engine in release mode
        working-directory: engine
        run: cargo build --release -p engine-core

      - name: npm ci (${{ matrix.app }})
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          # Bumped suffix when webkit was added to mobile's playwright.config;
          # without it the cache from the chromium-only era satisfied the
          # restore and the install step skipped the new browser.
          key: ${{ runner.os }}-pw-v2-${{ hashFiles(format('{0}/package-lock.json', matrix.app)) }}

      - name: Install Playwright browsers
        working-directory: ${{ matrix.app }}
        # Mobile has both chromium and webkit projects (webkit is the same
        # engine as iOS Safari and acts as the iOS proxy). Other apps only
        # have chromium configured. Installing both for every matrix entry
        # is one cheap step that avoids per-app branching here.
        run: npx playwright install --with-deps chromium webkit

      - name: Run e2e (using prebuilt engine binary)
        working-directory: ${{ matrix.app }}
        env:
          SPECTRE_ENGINE_BIN: ${{ github.workspace }}/engine/target/release/engine-core
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.app }}
          path: |
            ${{ matrix.app }}/playwright-report
            ${{ matrix.app }}/test-results
          retention-days: 7
