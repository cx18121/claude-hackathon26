name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-flight run when a newer commit arrives on the same ref —
# saves minutes on rapid fixup pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol-drift:
    name: protocol bindings up-to-date
    runs-on: ubuntu-latest
    # Catches the failure mode where someone edits
    # engine/engine-core/src/protocol.rs (or
    # shared/protocol.unions.ts.tmpl) without running
    # scripts/regen-protocol.sh — the auto-gen pipeline only helps
    # if shared/protocol.ts + shared/bindings/ stay in sync with
    # the Rust sources.
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-protocol-${{ hashFiles('engine/**/Cargo.lock', 'engine/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Regenerate shared/protocol.ts and shared/bindings/
        run: scripts/regen-protocol.sh

      - name: Fail if regen produced any diff
        run: |
          if ! git diff --exit-code -- shared/protocol.ts shared/bindings/; then
            echo ""
            echo "::error::shared/protocol.ts or shared/bindings/ is stale."
            echo "Run \`scripts/regen-protocol.sh\` locally and commit the result."
            exit 1
          fi

  rust-tests:
    name: cargo test + build (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + targets
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
            games/boxing/server/target
            games/dance/server/target
            games/fps-boxing/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine/**/Cargo.lock', 'engine/**/Cargo.toml', 'games/**/Cargo.lock', 'games/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test (engine workspace)
        working-directory: engine
        run: cargo test --workspace --all-targets

      - name: Build game server binaries (compile check)
        run: |
          cargo build --manifest-path games/boxing/server/Cargo.toml
          cargo build --manifest-path games/dance/server/Cargo.toml
          cargo build --manifest-path games/fps-boxing/server/Cargo.toml

  node-tests:
    name: vitest (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [games/boxing/client, games/dance/client, games/fps-boxing/client]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: npm ci
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: vitest
        working-directory: ${{ matrix.app }}
        run: npm test

  node-build:
    name: npm run build (${{ matrix.app }})
    runs-on: ubuntu-latest
    # vitest doesn't catch `tsc -b --force` strict-mode breakage because
    # each app's root tsconfig.json uses `"files": []` + `references`, so
    # `npx tsc --noEmit` invoked at the project root is a no-op. Railway
    # uses `npm run build` (= `tsc -b --force && vite build`), so CI must
    # too — otherwise a passing PR can break the deploy.
    strategy:
      fail-fast: false
      matrix:
        app: [games/boxing/client, games/dance/client, games/fps-boxing/client]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: npm ci
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: npm run build
        working-directory: ${{ matrix.app }}
        run: npm run build

  e2e:
    name: playwright e2e (${{ matrix.game }})
    runs-on: ubuntu-latest
    # Need game server binary + chromium + app build chained — give it room.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - game: fps-boxing
            app: games/fps-boxing/client
            server: games/fps-boxing/server
            binary: fps-boxing-server
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
            ${{ matrix.server }}/target
          key: ${{ runner.os }}-cargo-e2e-${{ matrix.game }}-${{ hashFiles('engine/**/Cargo.lock', 'engine/**/Cargo.toml', format('{0}/**', matrix.server)) }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-${{ matrix.game }}-
            ${{ runner.os }}-cargo-

      - name: Build ${{ matrix.game }} server (release)
        run: cargo build --release --manifest-path ${{ matrix.server }}/Cargo.toml

      - name: npm ci (${{ matrix.app }})
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-v2-${{ hashFiles(format('{0}/package-lock.json', matrix.app)) }}

      - name: Install Playwright browsers
        working-directory: ${{ matrix.app }}
        run: npx playwright install --with-deps chromium webkit

      - name: Run e2e
        working-directory: ${{ matrix.app }}
        env:
          SPECTRE_ENGINE_BIN: ${{ github.workspace }}/${{ matrix.server }}/target/release/${{ matrix.binary }}
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.game }}
          path: |
            ${{ matrix.app }}/playwright-report
            ${{ matrix.app }}/test-results
          retention-days: 7
