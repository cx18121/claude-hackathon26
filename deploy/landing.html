<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Spectre</title>
  <style>
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p { color: #555; }
    ul { list-style: none; padding: 0; }
    li { margin: 0.5rem 0; }
    a { display: inline-block; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; text-decoration: none; color: #222; }
    a:hover { background: #f4f4f4; }
    code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Spectre</h1>
  <p>Three games served from one container. Open one:</p>
  <ul>
    <li><a href="/boxing/">/boxing/</a></li>
    <li><a href="/dance/">/dance/</a></li>
    <li><a href="/fps-boxing/">/fps-boxing/</a></li>
  </ul>
  <p>Each client expects a <code>?server=&lt;ws-url&gt;&amp;room=&lt;code&gt;</code> query string to connect to its game server.</p>
</body>
</html>
